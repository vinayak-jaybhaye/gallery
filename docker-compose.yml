services:
  db:
    image: postgres:16
    container_name: gallery-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gallery
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d gallery" ]
      interval: 5s
      timeout: 5s
      retries: 5

  db-migrate:
    image: node:20-alpine
    container_name: gallery-db-migrate
    depends_on:
      db:
        condition: service_healthy
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/gallery
    volumes:
      - ./:/workspace
    command: >
      sh -c "corepack enable && pnpm --filter @gallery/db exec prisma migrate deploy"
    restart: "no"

  localstack:
    image: localstack/localstack:3
    container_name: gallery-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./localstack-init.sh:/etc/localstack/init/ready.d/10-localstack-init.sh:ro

volumes:
  pgdata:
  localstack-data:
